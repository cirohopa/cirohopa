<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="260">
  <style>
    .name { font: bold 46px 'Segoe UI', Arial, sans-serif; fill: #008080; text-anchor: middle; }
    .subtitle { font: bold 14px 'Segoe UI', Arial, sans-serif; fill: #ffffff; text-anchor: middle; letter-spacing: 2px; }
    .quote { font: bold 16px 'Segoe UI', Arial, sans-serif; fill: #008080; text-anchor: middle; }
    
    /* Animação de digitação segura para o GitHub (CSS Puro) */
    .cover {
      fill: #0a0a0a;
      animation: typing 6s steps(60, end) infinite;
    }
    
    @keyframes typing {
      0%, 15% { transform: translateX(0); }
      45%, 75% { transform: translateX(720px); }
      85%, 100% { transform: translateX(0); }
    }
  </style>
  
  <rect width="100%" height="100%" fill="#0a0a0a" />
  
  <rect x="40" y="40" width="720" height="2" fill="#008080" />
  <rect x="40" y="170" width="720" height="2" fill="#008080" />

  <text x="400" y="105" class="name">Ciro Henrique Oliveira</text>

  <!-- Subtítulo -->
  <text x="400" y="145" class="subtitle">DESENVOLVEDOR FULLSTACK | ENGENHEIRO DE SOFTWARE EM FORMAÇÃO</text>
  
  <!-- Retângulo simulando a digitação cobrindo e revelando o texto -->
  <rect x="90" y="125" width="720" height="30" class="cover" />

  <text x="400" y="215" class="quote">Transformando ideias em soluções tecnológicas</text>
</svg>

